// ╔══════════════════════════════════════════════════════════════════════════════╗
// ║  AUTH — MSAL setup                                                          ║
// ╚══════════════════════════════════════════════════════════════════════════════╝
var msalInstance = null;
var currentAccount = null;

var msalConfig = {
  auth: {
    clientId: CONFIG.clientId,
    authority: 'https://login.microsoftonline.com/' + CONFIG.tenantId,
    redirectUri: 'https://kevink4056837.github.io/ndl-l10-runner/index.html'
  },
  cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: true }
};

async function initAuth() {
  msalInstance = new msal.PublicClientApplication(msalConfig);
  await msalInstance.initialize();

  // Handle redirect response (if returning from auth redirect)
  var resp = await msalInstance.handleRedirectPromise();
  if (resp) currentAccount = resp.account;

  // Check for existing accounts
  var accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) currentAccount = accounts[0];

  return currentAccount;
}

async function getToken() {
  var tokenRequest = {
    scopes: [CONFIG.siteUrl + '/.default'],
    account: currentAccount
  };
  try {
    var resp = await msalInstance.acquireTokenSilent(tokenRequest);
    return resp.accessToken;
  } catch (e) {
    // Silent failed — try redirect (popups blocked in Teams)
    try {
      await msalInstance.acquireTokenRedirect(tokenRequest);
    } catch (e2) {
      console.error('Auth failed:', e2);
      throw e2;
    }
  }
}

async function login() {
  try {
    await msalInstance.loginRedirect({
      scopes: [CONFIG.siteUrl + '/.default']
    });
    // Page will redirect — execution stops here
  } catch (e) {
    console.error('Login failed:', e);
    throw e;
  }
}

async function spGet(url) {
  var token = await getToken();
  var resp = await fetch(url, {
    headers: {
      'Accept': 'application/json;odata=nometadata',
      'Authorization': 'Bearer ' + token
    }
  });
  if (!resp.ok) throw new Error('SP GET failed: ' + resp.status);
  var data = await resp.json();
  return data.value || [];
}

async function spPost(url, body) {
  var token = await getToken();
  var resp = await fetch(url, {
    method: 'POST',
    headers: {
      'Accept': 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=verbose',
      'Authorization': 'Bearer ' + token
    },
    body: JSON.stringify(body)
  });
  if (!resp.ok) throw new Error('SP POST failed: ' + resp.status);
  return await resp.json();
}

async function spPatch(url, body) {
  var token = await getToken();
  var resp = await fetch(url, {
    method: 'POST',
    headers: {
      'Accept': 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=verbose',
      'Authorization': 'Bearer ' + token,
      'IF-MATCH': '*',
      'X-HTTP-Method': 'MERGE'
    },
    body: JSON.stringify(body)
  });
  if (!resp.ok) throw new Error('SP PATCH failed: ' + resp.status);
}

async function spDelete(url) {
  var token = await getToken();
  var resp = await fetch(url, {
    method: 'POST',
    headers: {
      'Accept': 'application/json;odata=nometadata',
      'Authorization': 'Bearer ' + token,
      'IF-MATCH': '*',
      'X-HTTP-Method': 'DELETE'
    }
  });
  if (!resp.ok) throw new Error('SP DELETE failed: ' + resp.status);
}

async function spGetCurrentUser() {
  var token = await getToken();
  var resp = await fetch(CONFIG.siteUrl + '/_api/web/currentuser', {
    headers: {
      'Accept': 'application/json;odata=nometadata',
      'Authorization': 'Bearer ' + token
    }
  });
  return await resp.json();
}

async function spSearchPeople(query) {
  var token = await getToken();
  var resp = await fetch(CONFIG.siteUrl + '/_api/SP.UI.ApplicationPages.ClientPeoplePickerWebServiceInterface.clientPeoplePickerSearchUser', {
    method: 'POST',
    headers: {
      'Accept': 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=verbose',
      'Authorization': 'Bearer ' + token
    },
    body: JSON.stringify({
      queryParams: {
        __metadata: { type: 'SP.UI.ApplicationPages.ClientPeoplePickerQueryParameters' },
        AllowEmailAddresses: false, AllowMultipleEntities: false,
        AllUrlZones: false, MaximumEntitySuggestions: 8,
        PrincipalSource: 15, PrincipalType: 1, QueryString: query

}

async function spEnsureUser(loginName) {
  var token = await getToken();
  var resp = await fetch(CONFIG.siteUrl + "/_api/web/ensureuser('" + encodeURIComponent(loginName) + "')", {
    method: 'POST',
    headers: {
      'Accept': 'application/json;odata=nometadata',
      'Content-Type': 'application/json;odata=verbose',
      'Authorization': 'Bearer ' + token
    },
    body: JSON.stringify({ __metadata: { type: 'SP.User' } })
  });
  return await resp.json();
}

var inTeams = false;
var teamsContext = null;

async function initTeams() {
  try {
    // Race against a 3-second timeout — Teams SDK hangs forever outside Teams
    await Promise.race([
      microsoftTeams.app.initialize(),
      new Promise(function(_, reject) { setTimeout(function(){ reject(new Error('Not in Teams')); }, 3000); })
    ]);
    inTeams = true;
    teamsContext = await microsoftTeams.app.getContext();

    // If we're in the config frame, register the save handler
    if (teamsContext.page && teamsContext.page.frameContext === 'settings') {
      microsoftTeams.pages.config.registerOnSaveHandler(function(saveEvent) {
        microsoftTeams.pages.config.setConfig({
          suggestedDisplayName: 'L10 Runner',
          entityId: 'ndl-l10-runner',
          contentUrl: window.location.origin + window.location.pathname,
          websiteUrl: CONFIG.siteUrl
        });
        saveEvent.notifySuccess();
      });
      microsoftTeams.pages.config.setValidityState(true);
    }

    return teamsContext;
  } catch (e) {
    // Not running inside Teams — that's fine
    inTeams = false;
    return null;
  }
}

var OWNER_COLORS = {
  'JK':'#e8a87c','MS':'#7ec8a8','RB':'#8ab4e8','TW':'#c8a8e8','JS':'#f0b87a',
  'KK':'#a8c8e8','AV':'#f0c4d4','DK':'#a8d8c8','BT':'#d4b8e8','CH':'#f4a4b4',
  'MY':'#b4d4f4','PW':'#c4e8c4','default':'#94a3b8'
};
var SECTIONS = [
  { id: 'segue',     label: 'Segue',        icon: '\uD83D\uDC4B' },
  { id: 'scorecard', label: 'Scorecard',     icon: '\uD83D\uDCCA' },
  { id: 'news',      label: 'Industry News', icon: '\uD83D\uDCF0' },
  { id: 'rocks',     label: 'Rock Review',   icon: '\uD83D\uDC8E' },
  { id: 'todos',     label: 'To-Do Review',  icon: '\u2705' },
  { id: 'ids',       label: 'IDS',           icon: '\uD83C\uDFAF' },
  { id: 'conclude',  label: 'Conclude',      icon: '\uD83C\uDFC1' }
];
var ROCK_STATUS = {
  'On Track':  { bg:'#d1fae5', color:'#065f46', border:'#6ee7b7' },
  'Off Track': { bg:'#fee2e2', color:'#991b1b', border:'#fca5a5' },
  'Blocked':   { bg:'#fef3c7', color:'#92400e', border:'#fcd34d' },
  'Complete':  { bg:'#e0f2fe', color:'#0c4a6e', border:'#7dd3fc' },
  'Dropped':   { bg:'#f3f4f6', color:'#6b7280', border:'#d1d5db' }
};

function gi(n) { return (n || '??').split(' ').map(function(x){ return x[0]; }).join('').toUpperCase().slice(0,2); }
function oc(i) { return OWNER_COLORS[i] || OWNER_COLORS['default']; }
function fmtSecs(s) { var a = Math.abs(s); return (s < 0 ? '-' : '') + Math.floor(a/60) + ':' + (a%60).toString().padStart(2,'0'); }
function fmtDate(iso) { if (!iso) return ''; return new Date(iso+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
function isOverdue(d) { return !!d && new Date(d+'T12:00:00') < new Date(new Date().toISOString().split('T')[0]+'T12:00:00'); }
function todayISO() { return new Date().toISOString().split('T')[0]; }
function defaultDue() { var d = new Date(); d.setDate(d.getDate()+7); return d.toISOString().split('T')[0]; }

function fmtVal(value, unit) {
  if (unit === 'dollar') {
    var abs = Math.abs(value);
    if (abs >= 1000000) return (value<0?'-':'') + '$' + (abs/1000000).toFixed(2) + 'M';
    if (abs >= 1000) return (value<0?'-':'') + '$' + (abs/1000).toFixed(1) + 'K';
    return (value<0?'-':'') + '$' + abs.toFixed(2);
  }
  if (unit === 'percent') return value + '%';
  return String(value);
}

var h = React.createElement; // shorthand

function sparkline(vals, w, ht) {
  w = w || 60; ht = ht || 20;
  if (!vals || vals.length < 2) return h('span',{style:{color:'#e5e7eb',fontSize:11}},'\u2014');
  var reversed = vals.slice().reverse();
  var nums = reversed.map(function(v){ return v.value; });
  var min = Math.min.apply(null,nums), max = Math.max.apply(null,nums);
  var range = max - min || 1;
  var pts = nums.map(function(v,i){ return Math.round(i*(w/(nums.length-1))||0)+','+Math.round(ht-((v-min)/range)*ht); }).join(' ');
  var lastOn = reversed[reversed.length-1] && reversed[reversed.length-1].onTrack === 'Yes';
  return h('svg',{viewBox:'0 0 '+w+' '+ht,style:{width:w,height:ht,display:'block'}},
    h('polyline',{points:pts,fill:'none',stroke:lastOn?'#10b981':'#ef4444',strokeWidth:'1.5',strokeLinejoin:'round',strokeLinecap:'round'})
  );
}

// Avatar component
function Av(props) {
  var name = props.name, size = props.size || 26, email = props.email;
  var initials = gi(name);
  var _a = React.useState(false), imgErr = _a[0], setImgErr = _a[1];
  var photoUrl = email ? CONFIG.siteUrl + '/_layouts/15/userphoto.aspx?size=' + (size>30?'M':'S') + '&accountname=' + encodeURIComponent(email) : null;
  if (photoUrl && !imgErr) {
    return h('img',{src:photoUrl,alt:name,onError:function(){setImgErr(true);},style:{width:size,height:size,borderRadius:'50%',objectFit:'cover',flexShrink:0}});
  }
  return h('div',{style:{width:size,height:size,borderRadius:'50%',background:oc(initials),display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.36,fontWeight:700,color:'#fff',flexShrink:0,userSelect:'none'}},initials);
}

// ╔══════════════════════════════════════════════════════════════════════════════╗
// ║  L10 RUNNER COMPONENT                                                       ║
// ╚══════════════════════════════════════════════════════════════════════════════╝
var NdlRunner = (function(_super) {
  // Extends React.Component
  function NdlRunner(props) {
    _super.call(this, props);
    var durations = {};
    SECTIONS.forEach(function(s) { durations[s.id] = (CONFIG.defaultDurations[s.id] || 5) * 60; });
    var sectionElapsed = {};
    SECTIONS.forEach(function(s) { sectionElapsed[s.id] = 0; });
    this.state = {
      meetingName: props.initialMeeting || CONFIG.meetings[0],
      currentSection: 'segue', elapsedSeconds: 0, sectionElapsed: sectionElapsed,
      isRunning: false, durations: durations, editingDur: null, durInput: '',
      attendees: [], metrics: [], rocks: [], issues: [], todos: [], milestones: [],
      loading: true,
      segueIdx: 0,
      expandedIssueId: null, idsStage: 'Identify', newIssueTitle: '', addingIssue: false,
      solvedThisMeeting: [], idsPriorityNext: 1,
      expandedRockId: null,
      showTodoPanel: false, todoTitle: '', todoDue: defaultDue(), todoMeeting: '',
      todoAssigneeId: null, todoAssigneeLogin: '', todoAssigneeName: '',
      todoAssigneeSearch: '', todoAssigneeSuggestions: [],
      todoSourceType: 'Meeting', todoSourceTitle: '', todoSaving: false, todoLinkedIssueId: null,
      endingMeeting: false, meetingSent: false,
      currentUserName: '', currentUserEmail: ''
    };
    this._timerRef = null;
    this._pollRef = null;
    this._sectionStart = 0;
    return this;
  }
  // Inherit from React.Component
  NdlRunner.prototype = Object.create(_super.prototype);
  NdlRunner.prototype.constructor = NdlRunner;

  NdlRunner.prototype.componentDidMount = function() {
    var self = this;
    spGetCurrentUser().then(function(u) {
      self.setState({ currentUserName: u.Title || '', currentUserEmail: u.Email || '' });
    }).catch(function(){});
    this._loadAll();
    // Poll SharePoint every 10 seconds so all users see near-real-time updates
    this._pollRef = setInterval(function() { self._pollData(); }, 10000);
  };
  NdlRunner.prototype.componentWillUnmount = function() {
    if (this._timerRef) clearInterval(this._timerRef);
    if (this._pollRef) clearInterval(this._pollRef);
  };

  // ── Background poll (smart merge — preserves UI state) ──
  NdlRunner.prototype._pollData = function() {
    var self = this;
    var mtg = this.state.meetingName;
    var S = CONFIG.siteUrl;
    var L = CONFIG.lists;
    var Q = CONFIG.quarter;
    Promise.all([
      spGet(S+"/_api/web/lists/getbytitle('"+L.issues+"')/items?$select=Id,Title,Description,Priority,Status,Owner/Title&$expand=Owner&$filter=Meeting eq '"+encodeURIComponent(mtg)+"' and Status eq 'Open'&$orderby=Priority asc&$top=200"),
      spGet(S+"/_api/web/lists/getbytitle('"+L.todos+"')/items?$select=Id,Title,DueDate,Completed,SourceType,Created,Owner/Title,Owner/EMail&$expand=Owner&$filter=Meeting eq '"+encodeURIComponent(mtg)+"'&$orderby=DueDate asc&$top=500"),
      spGet(S+"/_api/web/lists/getbytitle('"+L.rocks+"')/items?$select=Id,Title,Details,RockStatus,BlockerNote,RockType,DueDate,Owner/Title&$expand=Owner&$filter=Meeting eq '"+encodeURIComponent(mtg)+"' and Quarter eq '"+Q+"'&$top=100"),
      spGet(S+"/_api/web/lists/getbytitle('"+L.milestones+"')/items?$select=Id,Title,RockTitle,DueDate,Completed&$top=1000")
    ]).then(function(results) {
      var issuesRaw = results[0], todosRaw = results[1], rocksRaw = results[2], msRaw = results[3];

      var issues = issuesRaw.map(function(i) {
        return { id:i.Id, title:i.Title||'', description:i.Description||'',
          priority:i.Priority?Number(i.Priority):null, ownerName:i.Owner?i.Owner.Title:'', issueStatus:i.Status||'Open' };
      });
      var todos = todosRaw.map(function(t) {
        return { id:t.Id, title:t.Title||'', ownerName:t.Owner?t.Owner.Title:'', ownerEmail:t.Owner?t.Owner.EMail:'',
          dueDate:t.DueDate?t.DueDate.split('T')[0]:'', completed:!!t.Completed,
          sourceType:t.SourceType||'Meeting', createdDate:t.Created?t.Created.split('T')[0]:'' };
      });
      var milestones = msRaw.map(function(m) {
        return { id:m.Id, title:m.Title||'', rockTitle:m.RockTitle||'', dueDate:m.DueDate?m.DueDate.split('T')[0]:'', completed:!!m.Completed };
      });
      var rocks = rocksRaw.filter(function(r){ return r.RockStatus!=='Dropped'&&r.RockStatus!=='Complete'; }).map(function(r) {
        var ms = msRaw.filter(function(m){ return m.RockTitle===r.Title; });
        return { id:r.Id, title:r.Title||'', rockStatus:r.RockStatus||'On Track',
          ownerName:r.Owner?r.Owner.Title:'', rockType:r.RockType||'Individual',
          milestonesDone:ms.filter(function(m){return m.Completed;}).length,
          milestonesTotal:ms.length, dueDate:r.DueDate?r.DueDate.split('T')[0]:'' };
      });

      // Merge: keep local solvedThisMeeting tracking, preserve expandedIssueId etc.
      self.setState({ issues: issues, todos: todos, rocks: rocks, milestones: milestones });
    }).catch(function(err) {
      console.warn('Poll error (will retry):', err);
    });
  };

  // ── Timer ──
  NdlRunner.prototype._startTimer = function() {
    var self = this;
    if (this._timerRef) clearInterval(this._timerRef);
    this._sectionStart = this.state.elapsedSeconds;
    this._timerRef = setInterval(function() {
      self.setState(function(prev) {
        var sec = prev.currentSection;
        var se = Object.assign({}, prev.sectionElapsed);
        se[sec] = se[sec] + 1;
        return { elapsedSeconds: prev.elapsedSeconds + 1, sectionElapsed: se };
      });
    }, 1000);
    this.setState({ isRunning: true });
  };
  NdlRunner.prototype._pauseTimer = function() {
    if (this._timerRef) { clearInterval(this._timerRef); this._timerRef = null; }
    this.setState({ isRunning: false });
  };
  NdlRunner.prototype._goToSection = function(id) {
    this.setState({ currentSection: id, expandedIssueId: null, expandedRockId: null, idsStage: 'Identify' });
  };

  // ── Data loading ──
  NdlRunner.prototype._loadAll = function() {
    var self = this;
    var mtg = this.state.meetingName;
    var S = CONFIG.siteUrl;
    var L = CONFIG.lists;
    var Q = CONFIG.quarter;
    this.setState({ loading: true });

    Promise.all([
      spGet(S+"/_api/web/lists/getbytitle('"+L.attendees+"')/items?$select=Id,Title,Bio,Attendee/EMail&$expand=Attendee&$filter=Meeting eq '"+encodeURIComponent(mtg)+"'&$top=50"),
      spGet(S+"/_api/web/lists/getbytitle('"+L.scorecardMetrics+"')/items?$select=Id,Title,Owner,Goal,GoalType,Unit,SortOrder&$filter=Meeting eq '"+encodeURIComponent(mtg)+"'&$orderby=SortOrder asc&$top=100"),
      spGet(S+"/_api/web/lists/getbytitle('"+L.scorecardData+"')/items?$select=Title,WeekDate,Value,OnTrack&$filter=Meeting eq '"+encodeURIComponent(mtg)+"'&$orderby=WeekDate desc&$top=2000"),
      spGet(S+"/_api/web/lists/getbytitle('"+L.rocks+"')/items?$select=Id,Title,Details,RockStatus,BlockerNote,RockType,DueDate,Owner/Title&$expand=Owner&$filter=Meeting eq '"+encodeURIComponent(mtg)+"' and Quarter eq '"+Q+"'&$top=100"),
      spGet(S+"/_api/web/lists/getbytitle('"+L.milestones+"')/items?$select=Id,Title,RockTitle,DueDate,Completed&$top=1000"),
      spGet(S+"/_api/web/lists/getbytitle('"+L.issues+"')/items?$select=Id,Title,Description,Priority,Status,Owner/Title&$expand=Owner&$filter=Meeting eq '"+encodeURIComponent(mtg)+"' and Status eq 'Open'&$orderby=Priority asc&$top=200"),
      spGet(S+"/_api/web/lists/getbytitle('"+L.todos+"')/items?$select=Id,Title,DueDate,Completed,SourceType,Created,Owner/Title,Owner/EMail&$expand=Owner&$filter=Meeting eq '"+encodeURIComponent(mtg)+"'&$orderby=DueDate asc&$top=500")
    ]).then(function(results) {
      var attRaw = results[0], metricsRaw = results[1], dataRaw = results[2],
          rocksRaw = results[3], msRaw = results[4], issuesRaw = results[5], todosRaw = results[6];

      var attendees = attRaw.map(function(a) {
        return { id: a.Id, name: a.Title||'', bio: a.Bio||'', email: a.Attendee?a.Attendee.EMail:'' };
      });

      var metrics = metricsRaw.map(function(m) {
        var vals = dataRaw.filter(function(d){ return d.Title===m.Title; }).slice(0,13).map(function(d){
          return { weekDate: d.WeekDate?d.WeekDate.split('T')[0]:'', value: d.Value, onTrack: d.OnTrack };
        });
        return { id:m.Id, title:m.Title, owner:m.Owner||'', goal:m.Goal, goalType:m.GoalType, unit:m.Unit, recentValues:vals };
      });

      var milestones = msRaw.map(function(m) {
        return { id:m.Id, title:m.Title||'', rockTitle:m.RockTitle||'', dueDate:m.DueDate?m.DueDate.split('T')[0]:'', completed:!!m.Completed };
      });

      var rocks = rocksRaw.filter(function(r){ return r.RockStatus!=='Dropped'&&r.RockStatus!=='Complete'; }).map(function(r) {
        var ms = msRaw.filter(function(m){ return m.RockTitle===r.Title; });
        return { id:r.Id, title:r.Title||'', rockStatus:r.RockStatus||'On Track',
          ownerName:r.Owner?r.Owner.Title:'', rockType:r.RockType||'Individual',
          milestonesDone:ms.filter(function(m){return m.Completed;}).length,
          milestonesTotal:ms.length, dueDate:r.DueDate?r.DueDate.split('T')[0]:'' };
      });

      var issues = issuesRaw.map(function(i) {
        return { id:i.Id, title:i.Title||'', description:i.Description||'',
          priority:i.Priority?Number(i.Priority):null, ownerName:i.Owner?i.Owner.Title:'', issueStatus:i.Status||'Open' };
      });

      var todos = todosRaw.map(function(t) {
        return { id:t.Id, title:t.Title||'', ownerName:t.Owner?t.Owner.Title:'', ownerEmail:t.Owner?t.Owner.EMail:'',
          dueDate:t.DueDate?t.DueDate.split('T')[0]:'', completed:!!t.Completed,
          sourceType:t.SourceType||'Meeting', createdDate:t.Created?t.Created.split('T')[0]:'' };
      });

      self.setState({ attendees:attendees, metrics:metrics, rocks:rocks, issues:issues, todos:todos, milestones:milestones, loading:false,
        todoMeeting: mtg, segueIdx: 0, expandedIssueId: null, expandedRockId: null,
        solvedThisMeeting: [], idsPriorityNext: 1 });
      self._autoAddOffTrackIssues(metrics, rocks, issues);
    }).catch(function(err) {
      console.error('Runner load error:', err);
      self.setState({ loading: false });
    });
  };

  NdlRunner.prototype._autoAddOffTrackIssues = function(metrics, rocks, existingIssues) {
    var self = this;
    var existing = existingIssues.map(function(i){ return i.title.toLowerCase(); });
    var toAdd = [];
    metrics.forEach(function(m) {
      if (m.recentValues.length >= 2 && m.recentValues.slice(0,2).every(function(v){ return v.onTrack==='No'; })) {
        var title = m.title + ' \u2014 off track 2+ weeks';
        if (existing.indexOf(title.toLowerCase()) === -1)
          toAdd.push({ title:title, description: m.title+' has been off track for two consecutive weeks. Goal: '+m.goal+'.' });
      }
    });
    rocks.filter(function(r){ return r.rockStatus==='Off Track'||r.rockStatus==='Blocked'; }).forEach(function(r) {
      var title = 'Rock '+r.rockStatus.toLowerCase()+': '+r.title;
      if (existing.indexOf(title.toLowerCase()) === -1)
        toAdd.push({ title:title, description: r.title+' ('+r.ownerName+') is '+r.rockStatus+'.' });
    });
    if (!toAdd.length) return;
    spGetCurrentUser().then(function(u) {
      var ownerId = u.Id;
      toAdd.forEach(function(item) {
        spPost(CONFIG.siteUrl+"/_api/web/lists/getbytitle('"+CONFIG.lists.issues+"')/items", {
          __metadata:{type:'SP.Data.Issues_x0020_ListListItem'}, Title:item.title,
          Description:item.description, OwnerId:ownerId, Meeting:self.state.meetingName,
          Status:'Open', CreatedDate:new Date().toISOString()
        }).then(function(ni) {
          self.setState(function(prev) {
            return { issues: prev.issues.concat([{id:ni.Id,title:item.title,description:item.description,priority:null,ownerName:'',issueStatus:'Open'}]) };
          });
        }).catch(function(e){ console.error('Auto-add error:',e); });
      });
    }).catch(function(e){ console.error('Auto-add error:',e); });
  };

  // ── Issue actions ──
  NdlRunner.prototype._setIssueStatus = function(issue, status) {
    var self = this;
    this.setState(function(prev) {
      return {
        issues: prev.issues.map(function(i){ return i.id===issue.id?Object.assign({},i,{issueStatus:status}):i; }),
        solvedThisMeeting: status==='Solved' ? prev.solvedThisMeeting.concat([issue.id]) : prev.solvedThisMeeting.filter(function(id){return id!==issue.id;}),
        expandedIssueId: null
      };
    });
    spPatch(CONFIG.siteUrl+"/_api/web/lists/getbytitle('"+CONFIG.lists.issues+"')/items("+issue.id+")", {
      __metadata:{type:'SP.Data.Issues_x0020_ListListItem'}, Status:status,
      SolvedDate: status==='Solved' ? new Date().toISOString() : null
    }).catch(function(e){ console.error(e); });
  };

  NdlRunner.prototype._assignNextPriority = function(issue) {
    var self = this;
    if (this.state.idsPriorityNext > 3) return;
    if (issue.priority !== null) return;
    var newP = this.state.idsPriorityNext;
    this.setState(function(prev) {
      var updated = prev.issues.map(function(i){ return i.id===issue.id?Object.assign({},i,{priority:newP}):i; });
      updated.sort(function(a,b) {
        if(a.priority===null&&b.priority===null)return 0;
        if(a.priority===null)return 1; if(b.priority===null)return -1;
        return a.priority-b.priority;
      });
      return { issues: updated, idsPriorityNext: prev.idsPriorityNext + 1 };
    });
    spPatch(CONFIG.siteUrl+"/_api/web/lists/getbytitle('"+CONFIG.lists.issues+"')/items("+issue.id+")", {
      __metadata:{type:'SP.Data.Issues_x0020_ListListItem'}, Priority: newP
    }).catch(function(e){ console.error(e); });
  };

  NdlRunner.prototype._unassignPriority = function(issue) {
    var self = this;
    if (issue.priority === null) return;
    var removedP = issue.priority;
    this.setState(function(prev) {
      var updated = prev.issues.map(function(i) {
        if (i.id === issue.id) return Object.assign({},i,{priority:null});
        if (i.priority !== null && i.priority > removedP) return Object.assign({},i,{priority:i.priority-1});
        return i;
      });
      updated.sort(function(a,b) {
        if(a.priority===null&&b.priority===null)return 0;
        if(a.priority===null)return 1; if(b.priority===null)return -1;
        return a.priority-b.priority;
      });
      return { issues: updated, idsPriorityNext: Math.max(1, prev.idsPriorityNext - 1) };
    });
    spPatch(CONFIG.siteUrl+"/_api/web/lists/getbytitle('"+CONFIG.lists.issues+"')/items("+issue.id+")", {
      __metadata:{type:'SP.Data.Issues_x0020_ListListItem'}, Priority: null
    }).catch(function(e){ console.error(e); });
    // Update shifted items
    this.state.issues.filter(function(i){ return i.priority!==null && i.id!==issue.id; }).forEach(function(i) {
      spPatch(CONFIG.siteUrl+"/_api/web/lists/getbytitle('"+CONFIG.lists.issues+"')/items("+i.id+")", {
        __metadata:{type:'SP.Data.Issues_x0020_ListListItem'}, Priority: i.priority
      }).catch(function(e){ console.error(e); });
    });
  };

  NdlRunner.prototype._clearPriorities = function() {
    var self = this;
    var toUpdate = this.state.issues.filter(function(i){ return i.priority!==null; });
    this.setState(function(prev) {
      return { issues: prev.issues.map(function(i){ return Object.assign({},i,{priority:null}); }), idsPriorityNext: 1 };
    });
    toUpdate.forEach(function(i) {
      spPatch(CONFIG.siteUrl+"/_api/web/lists/getbytitle('"+CONFIG.lists.issues+"')/items("+i.id+")", {
        __metadata:{type:'SP.Data.Issues_x0020_ListListItem'}, Priority: null
      }).catch(function(e){ console.error(e); });
    });
  };

  NdlRunner.prototype._setRockStatus = function(rock, status) {

  // ── To-Do actions ──
  NdlRunner.prototype._searchTodoAssignee = function(query) {
    var self = this;
    if (!query || query.length < 2) { this.setState({todoAssigneeSuggestions:[]}); return; }
    spSearchPeople(query).then(function(results) {
      self.setState({ todoAssigneeSuggestions: results.filter(function(u){return u.EntityType==='User';}).map(function(u){
        return { id:0, name:u.DisplayText, email:u.Description||'', loginName:u.Key };
      })});
    }).catch(function(){ self.setState({todoAssigneeSuggestions:[]}); });

  NdlRunner.prototype._completeTodo = function(todo) {
    this.setState(function(prev) {
      return { todos: prev.todos.map(function(t){ return t.id===todo.id?Object.assign({},t,{completed:true}):t; }) };
    });
    spPatch(CONFIG.siteUrl+"/_api/web/lists/getbytitle('"+CONFIG.lists.todos+"')/items("+todo.id+")", {
      __metadata:{type:'SP.Data.ToDosListItem'}, Completed:true, CompletedDate:new Date().toISOString()
    }).catch(function(e){ console.error(e); });

  NdlRunner.prototype._submitTodo = function() {
    var self = this;
    var st = this.state;
    if (!st.todoTitle.trim()) return;
    this.setState({ todoSaving: true });
    var ownerPromise;
    if (st.todoAssigneeLogin) {
      ownerPromise = spEnsureUser(st.todoAssigneeLogin).then(function(u){ return u.Id; });
    } else {
      ownerPromise = spGetCurrentUser().then(function(u){ return u.Id; });
    }
    ownerPromise.then(function(ownerId) {
      return spPost(CONFIG.siteUrl+"/_api/web/lists/getbytitle('"+CONFIG.lists.todos+"')/items", {
        __metadata:{type:'SP.Data.ToDosListItem'}, Title:st.todoTitle.trim(), OwnerId:ownerId,
        Meeting: st.todoMeeting || st.meetingName, DueDate: st.todoDue ? st.todoDue+'T00:00:00Z' : null,
        Completed: false, SourceType: st.todoSourceType,
        SourceTitle: st.todoLinkedIssueId ? (st.issues.find(function(i){return i.id===st.todoLinkedIssueId;})||{}).title||'' : st.todoSourceTitle.trim()
      });
    }).then(function(ni) {
      var newTodo = { id:ni.Id, title:st.todoTitle.trim(), ownerName:st.todoAssigneeName||st.currentUserName,
        ownerEmail:'', dueDate:st.todoDue, completed:false, sourceType:st.todoSourceType, createdDate:todayISO() };
      self.setState(function(prev) {
        return { todos:prev.todos.concat([newTodo]), showTodoPanel:false, todoTitle:'', todoDue:defaultDue(),
          todoMeeting:prev.meetingName, todoAssigneeId:null, todoAssigneeLogin:'', todoAssigneeName:'',
          todoAssigneeSearch:'', todoAssigneeSuggestions:[], todoSourceType:'Meeting', todoSourceTitle:'',
          todoSaving:false, todoLinkedIssueId:null };
      });
    }).catch(function(e) { console.error(e); self.setState({todoSaving:false}); });
  };

  // ── End meeting ──
  NdlRunner.prototype._endMeeting = function() {
    var self = this;
    this.setState({ endingMeeting: true });
    var st = this.state;
    var payload = {
      meetingName: st.meetingName,
      meetingDate: new Date().toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}),
      recipients: st.attendees.filter(function(a){return a.email;}).map(function(a){return{name:a.name,email:a.email};}),
      solvedIssues: st.issues.filter(function(i){return st.solvedThisMeeting.indexOf(i.id)!==-1;}).map(function(i){return i.title;}),
      openIssues: st.issues.filter(function(i){return i.issueStatus==='Open'&&st.solvedThisMeeting.indexOf(i.id)===-1;}).length,
      newTodos: st.todos.filter(function(t){return t.createdDate===todayISO();}).map(function(t){return{title:t.title,owner:t.ownerName,due:t.dueDate};}),
      rocksOnTrack: st.rocks.filter(function(r){return r.rockStatus==='On Track';}).length,
      rocksTotal: st.rocks.length,
      offTrackMetrics: st.metrics.filter(function(m){return m.recentValues.length>0&&m.recentValues[0].onTrack==='No';}).map(function(m){return m.title;}),
      durationMinutes: Math.round(st.elapsedSeconds/60)
    };
    var done = function() { self.setState({endingMeeting:false, meetingSent:true}); };
    if (CONFIG.flowUrl) {
      fetch(CONFIG.flowUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}).then(done).catch(function(e){console.error('Flow error:',e);done();});
    } else { done(); }
  };

  NdlRunner.prototype.render = function() {

    var secRemaining = st.durations[st.currentSection] - st.sectionElapsed[st.currentSection];
    var overtime = secRemaining < 0;
    var totalMins = 0;
